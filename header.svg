<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900">
  <defs>
    <style>
      .title-letter { animation: dropIn 0.5s cubic-bezier(0.16,1,0.3,1) both; opacity: 0; }
      .r1 { animation-delay: 0.1s; }
      .r2 { animation-delay: 0.2s; }
      .r3 { animation-delay: 0.3s; }
      .r4 { animation-delay: 0.4s; }
      .r5 { animation-delay: 0.5s; }
      .r6 { animation-delay: 0.6s; }
      @keyframes dropIn {
        from { opacity: 0; transform: translateY(-28px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .tag-line  { animation: fadeUp 0.6s ease 1.0s both; opacity: 0; }
      .sub-line  { animation: fadeUp 0.6s ease 1.3s both; opacity: 0; }
      .badge-row { animation: fadeUp 0.6s ease 1.6s both; opacity: 0; }
      .corner-tl { animation: drawIn 0.8s ease 0.8s both; opacity: 0; }
      .corner-br { animation: drawIn 0.8s ease 1.0s both; opacity: 0; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes drawIn {
        from { opacity: 0; stroke-dashoffset: 60; }
        to   { opacity: 1; stroke-dashoffset: 0; }
      }
      .pulse-ring {
        animation: pulseRing 3s ease-in-out infinite;
        transform-origin: 450px 140px;
      }
      @keyframes pulseRing {
        0%, 100% { opacity: 0.06; transform: scale(1); }
        50%       { opacity: 0.12; transform: scale(1.04); }
      }
      .grid-drift {
        animation: gridDrift 20s linear infinite;
      }
      @keyframes gridDrift {
        from { transform: translate(0,0); }
        to   { transform: translate(30px,30px); }
      }
      .scan-line {
        animation: scanDown 4s linear infinite;
      }
      @keyframes scanDown {
        from { transform: translateY(-280px); opacity: 0.5; }
        60%  { opacity: 0.5; }
        to   { transform: translateY(560px); opacity: 0; }
      }
      .dot-pulse { animation: dotPulse 2s ease-in-out infinite; }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 1; }
      }
    </style>

    <pattern id="dotgrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="rgba(0,255,180,0.12)"/>
    </pattern>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00FFD1" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00FFD1" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accentLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00FFD1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00FFD1" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="accentRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#FF2D78" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF2D78" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00FFD1" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00FFD1" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#FF2D78" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF2D78" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="mainClip">
      <rect width="900" height="280"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#060A12"/>

  <!-- Dot grid -->
  <g clip-path="url(#mainClip)">
    <rect width="960" height="340" fill="url(#dotgrid)" class="grid-drift" transform="translate(-30,-30)"/>
  </g>

  <!-- Center glow -->
  <rect width="900" height="280" fill="url(#centerGlow)" class="pulse-ring"/>

  <!-- Edge glows -->
  <rect x="0"   y="0" width="180" height="280" fill="url(#accentLeft)"/>
  <rect x="720" y="0" width="180" height="280" fill="url(#accentRight)"/>

  <!-- Scan sweep -->
  <rect x="0" y="0" width="900" height="2" fill="rgba(0,255,180,0.25)" class="scan-line" clip-path="url(#mainClip)"/>

  <!-- Top / bottom border lines -->
  <rect x="0" y="0"     width="900" height="1.5" fill="url(#topLine)"/>
  <rect x="0" y="278.5" width="900" height="1.5" fill="url(#topLine)"/>

  <!-- Corner brackets -->
  <g class="corner-tl" stroke-dasharray="60" stroke-dashoffset="60">
    <path d="M 40 18 L 18 18 L 18 50" fill="none" stroke="#00FFD1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g class="corner-tl" stroke-dasharray="60" stroke-dashoffset="60" style="animation-delay:0.9s">
    <path d="M 860 18 L 882 18 L 882 50" fill="none" stroke="#00FFD1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g class="corner-br" stroke-dasharray="60" stroke-dashoffset="60">
    <path d="M 40 262 L 18 262 L 18 230" fill="none" stroke="#FF2D78" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g class="corner-br" stroke-dasharray="60" stroke-dashoffset="60" style="animation-delay:1.1s">
    <path d="M 860 262 L 882 262 L 882 230" fill="none" stroke="#FF2D78" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Side circuit lines left -->
  <g opacity="0.2" class="tag-line">
    <line x1="18" y1="100" x2="55" y2="100" stroke="#00FFD1" stroke-width="0.5"/>
    <circle cx="58" cy="100" r="2" fill="#00FFD1" class="dot-pulse"/>
    <line x1="18" y1="140" x2="70" y2="140" stroke="#00FFD1" stroke-width="0.5"/>
    <line x1="18" y1="180" x2="55" y2="180" stroke="#00FFD1" stroke-width="0.5"/>
    <circle cx="58" cy="180" r="2" fill="#00FFD1" class="dot-pulse" style="animation-delay:1s"/>
  </g>

  <!-- Side circuit lines right -->
  <g opacity="0.2" class="tag-line">
    <line x1="882" y1="100" x2="845" y2="100" stroke="#FF2D78" stroke-width="0.5"/>
    <circle cx="842" cy="100" r="2" fill="#FF2D78" class="dot-pulse" style="animation-delay:0.5s"/>
    <line x1="882" y1="140" x2="830" y2="140" stroke="#FF2D78" stroke-width="0.5"/>
    <line x1="882" y1="180" x2="845" y2="180" stroke="#FF2D78" stroke-width="0.5"/>
    <circle cx="842" cy="180" r="2" fill="#FF2D78" class="dot-pulse" style="animation-delay:1.5s"/>
  </g>

  <!-- Main title — letters drop in one by one -->
  <g font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="96" fill="white">
    <text class="title-letter r1" x="180" y="168" text-anchor="middle">R</text>
    <text class="title-letter r2" x="268" y="168" text-anchor="middle">I</text>
    <text class="title-letter r3" x="340" y="168" text-anchor="middle">S</text>
    <text class="title-letter r4" x="430" y="168" text-anchor="middle">H</text>
    <text class="title-letter r5" x="534" y="168" text-anchor="middle">A</text>
    <text class="title-letter r6" x="622" y="168" text-anchor="middle">B</text>
  </g>

  <!-- Underline glow -->
  <rect x="160" y="178" width="490" height="1.5" fill="url(#topLine)" class="tag-line" opacity="0.6"/>

  <!-- Tagline -->
  <text x="450" y="212" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="5"
    class="tag-line">AI  ·  IoT  ·  Full-Stack  ·  Hardware</text>

  <!-- Sub line -->
  <text x="450" y="240" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="10" fill="rgba(0,255,180,0.4)" letter-spacing="2"
    class="sub-line">idea → circuit → code → product</text>

  <!-- Badge row -->
  <g class="badge-row">
    <rect x="305" y="252" width="64" height="18" rx="4" fill="rgba(0,255,180,0.08)" stroke="rgba(0,255,180,0.3)" stroke-width="0.5"/>
    <text x="337" y="264" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#00FFD1">India 🇮🇳</text>

    <rect x="379" y="252" width="94" height="18" rx="4" fill="rgba(255,45,120,0.08)" stroke="rgba(255,45,120,0.3)" stroke-width="0.5"/>
    <text x="426" y="264" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#FF2D78">open to collab</text>

    <rect x="483" y="252" width="112" height="18" rx="4" fill="rgba(124,77,255,0.08)" stroke="rgba(124,77,255,0.3)" stroke-width="0.5"/>
    <text x="539" y="264" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#B388FF">always shipping</text>
  </g>

</svg>
