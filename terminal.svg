<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <style>
      .bg    { fill: #0D1117; }
      .bar   { fill: #141C26; }
      .d1    { fill: #FF5F57; }
      .d2    { fill: #FEBC2E; }
      .d3    { fill: #28C840; }
      .dim   { fill: #444C56; }
      .wht   { fill: #CDD9E5; }
      .grn   { fill: #00FFD1; }
      .grn2  { fill: #00C9A7; }
      .yel   { fill: #F0A500; }
      .mgt   { fill: #D2A8FF; }
      .muted { fill: #7D8590; }
      text   { font-size: 13px; }
      .cur   { fill: #00FFD1; animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .l { opacity: 0; animation: pop 0.01s forwards; }
      .l00 { animation-delay: 0.4s; }
      .l01 { animation-delay: 0.5s; }
      .l02 { animation-delay: 0.6s; }
      .l03 { animation-delay: 0.7s; }
      .l10 { animation-delay: 1.4s; }
      .l11 { animation-delay: 1.5s; }
      .l12 { animation-delay: 1.6s; }
      .l13 { animation-delay: 1.7s; }
      .l14 { animation-delay: 1.8s; }
      .l15 { animation-delay: 1.9s; }
      .l20 { animation-delay: 2.8s; }
      .l21 { animation-delay: 2.9s; }
      .l22 { animation-delay: 3.0s; }
      .l30 { animation-delay: 3.8s; }
      .l31 { animation-delay: 3.9s; }
      .l40 { animation-delay: 5.2s; }
      @keyframes pop { to { opacity: 1; } }
    </style>
  </defs>

  <rect width="900" height="340" rx="10" class="bg"/>
  <rect width="900" height="40" rx="10" class="bar"/>
  <rect y="30" width="900" height="10" class="bar"/>
  <circle cx="24" cy="20" r="6" class="d1"/>
  <circle cx="46" cy="20" r="6" class="d2"/>
  <circle cx="68" cy="20" r="6" class="d3"/>
  <text x="450" y="26" text-anchor="middle" class="dim" font-size="12">risuhfoundry — zsh</text>
  <circle cx="876" cy="20" r="4" fill="#00FFD1" opacity="0.9">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="866" y="26" text-anchor="end" class="grn" font-size="10" letter-spacing="2">LIVE</text>

  <!-- LEFT: terminal -->
  <g class="l l00">
    <text x="24" y="74"><tspan class="grn">❯</tspan><tspan class="wht" dx="8">whoami</tspan></text>
  </g>
  <g class="l l01">
    <text x="40" y="93"><tspan class="muted">name  </tspan><tspan class="grn">→ </tspan><tspan class="wht">Rishab</tspan></text>
  </g>
  <g class="l l02">
    <text x="40" y="110"><tspan class="muted">role  </tspan><tspan class="grn">→ </tspan><tspan class="wht">Hardware × Full-Stack Engineer</tspan></text>
  </g>
  <g class="l l03">
    <text x="40" y="127"><tspan class="muted">base  </tspan><tspan class="grn">→ </tspan><tspan class="wht">Delhi, India</tspan></text>
  </g>

  <line x1="24" y1="141" x2="500" y2="141" stroke="rgba(0,255,209,0.07)" stroke-width="1"/>

  <g class="l l10">
    <text x="24" y="160"><tspan class="grn">❯</tspan><tspan class="wht" dx="8">cat stack.json</tspan></text>
  </g>
  <g class="l l11">
    <text x="40" y="178"><tspan class="mgt">"languages" </tspan><tspan class="dim">→ </tspan><tspan class="yel">C · C++ · Python · JS · Kotlin</tspan></text>
  </g>
  <g class="l l12">
    <text x="40" y="195"><tspan class="mgt">"frontend"  </tspan><tspan class="dim">→ </tspan><tspan class="yel">React · Next.js · Tailwind</tspan></text>
  </g>
  <g class="l l13">
    <text x="40" y="212"><tspan class="mgt">"backend"   </tspan><tspan class="dim">→ </tspan><tspan class="yel">Node.js · Django · GCP</tspan></text>
  </g>
  <g class="l l14">
    <text x="40" y="229"><tspan class="mgt">"hardware"  </tspan><tspan class="dim">→ </tspan><tspan class="yel">Arduino · RPi · MQTT</tspan></text>
  </g>
  <g class="l l15">
    <text x="40" y="246"><tspan class="mgt">"ai"        </tspan><tspan class="dim">→ </tspan><tspan class="yel">TensorFlow · LLMs · Edge ML</tspan></text>
  </g>

  <line x1="24" y1="258" x2="500" y2="258" stroke="rgba(0,255,209,0.07)" stroke-width="1"/>

  <g class="l l20">
    <text x="24" y="276"><tspan class="grn">❯</tspan><tspan class="wht" dx="8">git log --oneline -2</tspan></text>
  </g>
  <g class="l l21">
    <text x="40" y="294"><tspan class="yel">a3f9c12 </tspan><tspan class="wht">ship: ai iot sensor dashboard v2</tspan></text>
  </g>
  <g class="l l22">
    <text x="40" y="311"><tspan class="yel">7d1e048 </tspan><tspan class="wht">feat: mqtt broker + cloud sync</tspan></text>
  </g>

  <g class="l l40">
    <text x="24" y="330"><tspan class="grn">❯</tspan></text>
    <rect x="42" y="318" width="8" height="13" class="cur"/>
  </g>

  <!-- DIVIDER -->
  <line x1="530" y1="50" x2="530" y2="330" stroke="rgba(0,255,209,0.08)" stroke-width="1"/>

  <!-- RIGHT PANEL -->
  <g class="l l00">
    <!-- stat 1 -->
    <rect x="548" y="58" width="152" height="72" rx="6" fill="#141C26" stroke="rgba(0,255,209,0.15)" stroke-width="1"/>
    <text x="564" y="88" class="grn" font-size="30" font-weight="800">5+</text>
    <text x="564" y="106" class="muted" font-size="10" letter-spacing="2">YRS EXP</text>
    <text x="564" y="120" class="dim" font-size="10">hardware to cloud</text>
    <!-- stat 2 -->
    <rect x="712" y="58" width="152" height="72" rx="6" fill="#141C26" stroke="rgba(0,255,209,0.15)" stroke-width="1"/>
    <text x="728" y="88" class="grn" font-size="30" font-weight="800">20+</text>
    <text x="728" y="106" class="muted" font-size="10" letter-spacing="2">PROJECTS</text>
    <text x="728" y="120" class="dim" font-size="10">shipped &amp; deployed</text>
  </g>

  <g class="l l10">
    <text x="548" y="162" class="grn" font-size="10" letter-spacing="2">// SPECIALISATIONS</text>
    <rect x="548" y="172" width="316" height="22" rx="4" fill="rgba(0,255,209,0.06)"/>
    <text x="560" y="188" class="grn2" font-size="11">01</text>
    <text x="582" y="188" class="wht" font-size="11">Embedded Systems &amp; IoT</text>
    <rect x="548" y="198" width="316" height="22" rx="4" fill="rgba(0,255,209,0.03)"/>
    <text x="560" y="214" class="grn2" font-size="11">02</text>
    <text x="582" y="214" class="wht" font-size="11">Full-Stack Web Development</text>
    <rect x="548" y="224" width="316" height="22" rx="4" fill="rgba(0,255,209,0.06)"/>
    <text x="560" y="240" class="grn2" font-size="11">03</text>
    <text x="582" y="240" class="wht" font-size="11">AI / ML Integration</text>
    <rect x="548" y="250" width="316" height="22" rx="4" fill="rgba(0,255,209,0.03)"/>
    <text x="560" y="266" class="grn2" font-size="11">04</text>
    <text x="582" y="266" class="wht" font-size="11">Cloud Infrastructure &amp; DevOps</text>
    <rect x="548" y="276" width="316" height="22" rx="4" fill="rgba(0,255,209,0.06)"/>
    <text x="560" y="292" class="grn2" font-size="11">05</text>
    <text x="582" y="292" class="wht" font-size="11">Design · Blender · Figma · Adobe</text>
  </g>

  <g class="l l30">
    <rect x="548" y="310" width="316" height="22" rx="4" fill="rgba(0,255,209,0.1)" stroke="rgba(0,255,209,0.2)" stroke-width="1"/>
    <text x="706" y="326" class="grn" font-size="11" text-anchor="middle" letter-spacing="1">idea → circuit → code → product</text>
  </g>
</svg>
